# Default configuration — override per environment in staging.conf / prod.conf
# All values can be overridden via system properties: -Dbase.url=https://...

base.url = "https://www.saucedemo.com"
browser  = "chromium"
headless = true

timeout {
  default    = 30000   # ms — page and element default timeout
  navigation = 60000   # ms — full page load timeout
}

playwright {
  tracing = true       # Set false in CI if traces are not needed
}
